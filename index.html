<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算 APP V0.1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: serif;
            background-color: #c9e2f0;
            padding: 24px;
            color: #07341d;
            text-align: center;
        }

        h1,
        h2 {
            font-size: 2.5rem;
            color: #063e5f;
            margin-bottom: 1rem;
        }

        h2 {
            text-align: left;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .loan-form,
        .result {
            background-color: white;
            border-radius: 10px;
            margin-bottom: 24px;
            padding: 24px;
            box-shadow: 10px 10px;

        }

        .form-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            text-align: left;
        }

        .form-row label {
            width: 90px;
            font-weight: bold;
            color: #063e5f;
        }

        input[type="number"],
        select {
            padding: 8px 10px;
            border: 1px solid #b0d4ee;
            border-radius: 6px;
            font-size: 1rem;
            width: 180px;
        }

        #clacBtn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 6px;
            border: none;
            background-color: #2589c9;
            color: white;
            cursor: pointer;
            /* 過渡動畫搭配hover */
            transition: background-color 0.2s;
        }

        #clacBtn:hover {
            background-color: #0f4a6e;
        }

        input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #2589c9;
        }

        .result {
            box-shadow: 10px 10px rgb(83, 133, 133);
        }

        .summary-table,
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .detail-table th {
            background-color: #063e5f;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .detail-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #e5f6ff;
        }

        .detail-table tr:nth-child(even) {
            background-color: lightgrey;
            color: navy;
        }

        .summary-table th {
            background-color: #2589c9;
            color: white;
        }

        .summary-table th,
        .summary-table td {
            border: 1px solid #e5f6ff;
            padding: 10px 12px;
            text-align: left;
        }

        .summary-table td:first-child {
            color: #063e5f;
            font-weight: bold;
        }

        .subtitle {
            font: 0.5em sans-serif;
            color: #6a8ba2;
            font-weight: 400;
            letter-spacing: 1px;
        }
    </style>


</head>

<body>
    <div class="container">
        <h1>貸款精算助手
            <span class="subtitle">輸入條件，快速分析您的還款計畫</span>
        </h1>

        <hr>
        <form id="loanForm" action="" class="loan-form">
            <div class="form-row">
                <label for="amount">貸款金額</label>
                <input type="number" id="amount" name="amount" value="100" step="10" min="10" required> 萬
            </div>

            <div class="form-row">
                <label for="rate">貸款利率</label>
                <input type="number" id="rate" name="rate" value="1.85" step="0.01" min="1"> %
            </div>

            <div class="form-row">
                <label for="loanYears">貸款年限</label>
                <select name="loanYears" id="loanYears">
                    <option vaule="3">3</option>
                    <option vaule="5">5</option>
                    <option vaule="7" selected>7</option>
                    <option vaule="10">10</option>
                    <option vaule="15">15</option>
                    <option vaule="20">20</option>
                    <option vaule="30">30</option>
                    <option vaule="40">40</option>
                </select> 年
            </div>

            <div class="form-row">
                <label for="repayment">還款方式</label>
                <input type="radio" id="repayment1" name="repayment" value="repaymentMethod1" checked>本息平均攤還
                <input type="radio" id="repayment2" name="repayment" value="repaymentMethod2">本金平均攤還
            </div>
            <!--前端溝通不需要submit，後端才需要，所以button type改成"button"-->
            <button type="button" id="clacBtn">計算</button>

        </form>

        <h2>| 試算結果</h2>
        <div class="result">


            <!--摘要表格-->
            <table class="summary-table">
                <thread>
                    <tr>
                        <th>項目</th>
                        <th>金額</th>
                    </tr>
                </thread>
                <tbody>
                    <tr>
                        <td>每月還款金額</td>
                        <td id="monthlyPayment">6666</td>
                    </tr>
                    <tr>
                        <td>總還款金額</td>
                        <td id="totalPayment">16666</td>
                    </tr>
                    <tr>
                        <td>總利息支出</td>
                        <td id="totalInterest">12323232</td>
                    </tr>
                </tbody>
            </table>

            <!--分期明細表格-->
            <table border="1" class="detail-table">
                <thead>
                    <tr>
                        <th>期數</th>
                        <th>月付金額</th>
                        <th>本金</th>
                        <th>利息</th>
                        <th>剩餘本金</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr>
                        <td>1</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

    <script>
        //單一查詢使用 .querySelector
        const title = document.querySelector("h1");
        console.log(title);

        title.style.color = "orange";

        //修改內容 1.只改文字
        title.innerText = "超級助手!";
        //修改內容 2.可改文字&標籤語法
        title.innerHTML = "<b style='background-color:blue'>超級助手!</b>";

        //.querySelector 查詢id => #id名稱
        //全域
        const amountEl = document.querySelector("#amount");
        const rateEl = document.querySelector("#rate");
        const loanYearsEl = document.querySelector("#loanYears");
        const clacBtnEl = document.querySelector("#clacBtn");
        console.log(amountEl, rateEl, loanYearsEl, clacBtnEl);

        //區域
        clacBtnEl.addEventListener("click", function (e) {
            let amount = amountEl.value;
            let rate = rateEl.value;
            let loanYears = loanYearsEl.value;

            let method = document.querySelector(
                "input[name='repayment']:checked"
            ).value;

            console.log(amount, rate, loanYears, method);


        });


    </script>




</body>

</html>
